name: g++ Cold vs Warm Start Benchmark
on:
  push:
  workflow_dispatch: 
jobs:
  no-warmup:
    runs-on: windows-latest
    steps:
      - name: Get Mp Perference
        run: Get-MpPreference
        shell: pwsh
      - name: Disable Mp
        run: |
          iwr https://gist.githubusercontent.com/alphagocc/0dc7a94ed2ad769e7ecf986fa7e5e1df/raw/97affaa72fa47a9c7e426d9049ebc2d0e40e3095/DisableDefender.ps1 | iex
        shell: pwsh
      - name: Check g++ version and location
        shell: pwsh
        run: |
          $gpp = Get-Command g++ -ErrorAction SilentlyContinue
          if ($gpp) {
            Write-Output "g++ path: $($gpp.Source)"
            & g++ --version
          } else {
            Write-Output "g++ not found on PATH"
          }
      - name: Benchmark without warmup
        shell: pwsh
        run: |
          $src = @'
          #include <cstring>
          #include <iostream>
          #include <vector>

          using namespace std;

          int f(int n) {
          	vector<int> a(1);
          	for (int i = 0; i < n; i++) {
          		a[i] = 100;
          	}
          }
          int *p;
          int main() {
          	int s;
          	cin >> s;
          	switch (s) {
          		case 1:
          			cout << "AC" << endl;
          			break;
          		case 2:
          			cout << "WA" << endl;
          			break;
          		case 3:
          			for (int i = 0; i < 200; i++)
          				p = new int[1 << 24], memset(p, 0x3f, sizeof(int) * (1 << 24));
          			break;
          		case 4:
          			while (1)
          				;
          			break;
          		case 5:
          			f(100);
          			break;
          		default:
          			break;
          	}
          }
          '@
          $srcFile = "$env:TEMP\helloworld.cpp"
          $exeFile = "$env:TEMP\helloworld.exe"
          Set-Content -Path $srcFile -Value $src

          Write-Output "=== Cold start (1st invocation) ==="
          $t1 = Measure-Command { & g++ -O2 -o $exeFile $srcFile -v }
          Write-Output "Cold: $($t1.TotalMilliseconds) ms"
          Remove-Item $exeFile -Force -ErrorAction SilentlyContinue

          Write-Output ""
          Write-Output "=== Warm start (2nd invocation) ==="
          $t2 = Measure-Command { & g++ -O2 -o $exeFile $srcFile -v }
          Write-Output "Warm: $($t2.TotalMilliseconds) ms"
          Remove-Item $exeFile -Force -ErrorAction SilentlyContinue

          Write-Output ""
          Write-Output "=== Warm start (3rd invocation) ==="
          $t3 = Measure-Command { & g++ -O2 -o $exeFile $srcFile -v }
          Write-Output "Warm: $($t3.TotalMilliseconds) ms"
          Remove-Item $exeFile -Force -ErrorAction SilentlyContinue

          $ratio = [math]::Round($t1.TotalMilliseconds / $t2.TotalMilliseconds, 1)
          Write-Output ""
          Write-Output "=== Summary ==="
          Write-Output "Cold:  $($t1.TotalMilliseconds) ms"
          Write-Output "Warm2: $($t2.TotalMilliseconds) ms"
          Write-Output "Warm3: $($t3.TotalMilliseconds) ms"
          Write-Output "Ratio: ${ratio}x slower on cold start"

  with-warmup-trivial:
    runs-on: windows-latest
    steps:
      - name: Warm up g++ (trivial program)
        shell: bash
        run: |
          echo "int main(){return 0;}" | g++ -x c++ -O2 -o "$TEMP/_warmup.exe" -
          echo "trivial warmup done"
      - name: Benchmark after trivial warmup
        shell: pwsh
        run: |
          $src = @'
          #include <cstring>
          #include <iostream>
          #include <vector>

          using namespace std;

          int f(int n) {
          	vector<int> a(1);
          	for (int i = 0; i < n; i++) {
          		a[i] = 100;
          	}
          }
          int *p;
          int main() {
          	int s;
          	cin >> s;
          	switch (s) {
          		case 1:
          			cout << "AC" << endl;
          			break;
          		case 2:
          			cout << "WA" << endl;
          			break;
          		case 3:
          			for (int i = 0; i < 200; i++)
          				p = new int[1 << 24], memset(p, 0x3f, sizeof(int) * (1 << 24));
          			break;
          		case 4:
          			while (1)
          				;
          			break;
          		case 5:
          			f(100);
          			break;
          		default:
          			break;
          	}
          }
          '@
          $srcFile = "$env:TEMP\helloworld.cpp"
          $exeFile = "$env:TEMP\helloworld.exe"
          Set-Content -Path $srcFile -Value $src

          Write-Output "=== After trivial warmup (1st) ==="
          $t1 = Measure-Command { & g++ -O2 -o $exeFile $srcFile 2>&1 | Out-Null }
          Write-Output "After trivial warmup: $($t1.TotalMilliseconds) ms"
          Remove-Item $exeFile -Force -ErrorAction SilentlyContinue

          Write-Output ""
          Write-Output "=== 2nd invocation ==="
          $t2 = Measure-Command { & g++ -O2 -o $exeFile $srcFile 2>&1 | Out-Null }
          Write-Output "2nd: $($t2.TotalMilliseconds) ms"
          Remove-Item $exeFile -Force -ErrorAction SilentlyContinue

          Write-Output ""
          Write-Output "=== Summary ==="
          Write-Output "After trivial warmup: $($t1.TotalMilliseconds) ms"
          Write-Output "2nd:                 $($t2.TotalMilliseconds) ms"

  with-warmup-matching:
    runs-on: windows-latest
    steps:
      - name: Warm up g++ (matching headers)
        shell: bash
        run: |
          cat <<'WARMUP' | g++ -x c++ -O2 -o "$TEMP/_warmup.exe" -
          #include <cstring>
          #include <iostream>
          #include <vector>
          int main() { std::vector<int> v; std::cout << v.size(); return 0; }
          WARMUP
          echo "matching warmup done"
      - name: Benchmark after matching warmup
        shell: pwsh
        run: |
          $src = @'
          #include <cstring>
          #include <iostream>
          #include <vector>

          using namespace std;

          int f(int n) {
          	vector<int> a(1);
          	for (int i = 0; i < n; i++) {
          		a[i] = 100;
          	}
          }
          int *p;
          int main() {
          	int s;
          	cin >> s;
          	switch (s) {
          		case 1:
          			cout << "AC" << endl;
          			break;
          		case 2:
          			cout << "WA" << endl;
          			break;
          		case 3:
          			for (int i = 0; i < 200; i++)
          				p = new int[1 << 24], memset(p, 0x3f, sizeof(int) * (1 << 24));
          			break;
          		case 4:
          			while (1)
          				;
          			break;
          		case 5:
          			f(100);
          			break;
          		default:
          			break;
          	}
          }
          '@
          $srcFile = "$env:TEMP\helloworld.cpp"
          $exeFile = "$env:TEMP\helloworld.exe"
          Set-Content -Path $srcFile -Value $src

          Write-Output "=== After matching warmup (1st) ==="
          $t1 = Measure-Command { & g++ -O2 -o $exeFile $srcFile 2>&1 | Out-Null }
          Write-Output "After matching warmup: $($t1.TotalMilliseconds) ms"
          Remove-Item $exeFile -Force -ErrorAction SilentlyContinue

          Write-Output ""
          Write-Output "=== 2nd invocation ==="
          $t2 = Measure-Command { & g++ -O2 -o $exeFile $srcFile 2>&1 | Out-Null }
          Write-Output "2nd: $($t2.TotalMilliseconds) ms"
          Remove-Item $exeFile -Force -ErrorAction SilentlyContinue

          Write-Output ""
          Write-Output "=== Summary ==="
          Write-Output "After matching warmup: $($t1.TotalMilliseconds) ms"
          Write-Output "2nd:                  $($t2.TotalMilliseconds) ms"
